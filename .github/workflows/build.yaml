name: Build

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  MODULE_NAME: 'mountify-rs'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-linux-android

    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      id: setup-ndk
      with:
        ndk-version: r27

    - name: Build Rust core (arm64)
      run: |
        cd module/mountify-rs
        ANDROID_NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }} \
        CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER="${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang" \
        cargo build --release --target aarch64-linux-android
        cp target/aarch64-linux-android/release/mountify ../mountify-arm64

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Build WebUI
      run: |
        cd webui
        npm install
        npm run build

    - name: Package module
      run: |
        VERSION=$(grep "^version=" module/module.prop | cut -d= -f2 | tr -d 'v')
        COMMIT_ID=$(git rev-parse --short HEAD)
        ZIP_NAME="${MODULE_NAME}_v${VERSION}-${COMMIT_ID}.zip"
        cd module
        # Remove build artifacts
        rm -rf mountify-rs/target mountify-rs/Cargo.lock
        # Create standard zip (no compression - store mode for max compat)
        zip -0 -r "../${ZIP_NAME}" . -x "*.git*" "*.log"
        echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.ZIP_NAME }}
        path: ${{ env.ZIP_NAME }}
